<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIkVLIU1ZU1RFUlkiLAogICJzaG9ydF9uYW1lIjogIkVLIU1ZU1RFUlkiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBhMGExMiIsCiAgInRoZW1lX2NvbG9yIjogIzAwZDRmZiIsCiAgInljb25zIjogWwogICAgewogICAgICAic3JjIjogImh0dHBzOi8vY2RuLWljb25zLXBuZy5mbGF0aWNvbi5jb20vNTEyLzExNTUvMTE1NTAyNi5wbmciLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0=">
    <meta name="theme-color" content="#00d4ff">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; }
        body { background: #0a0a12; color: #d1d1d1; font-family: 'Segoe UI', sans-serif; margin: 0; padding-top: 70px; }

        /* NAVBAR */
        .navbar { 
            position: fixed; top: 0; left: 0; width: 100%; height: 65px;
            background: #000; display: flex; justify-content: space-between; 
            align-items: center; padding: 0 20px; border-bottom: 2px solid #00d4ff; z-index: 10005; 
        }
        .navbar .logo { color: #00d4ff; font-weight: bold; font-size: 1.4rem; cursor: pointer; }
        .menu-toggle { color: #00d4ff; font-size: 28px; cursor: pointer; background: none; border: none; }

        /* SIDE MENU (WORKING LINKS) */
        .side-menu {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: #111; border-right: 2px solid #00d4ff;
            transition: 0.4s ease; z-index: 10006; padding-top: 20px;
        }
        .side-menu.active { left: 0; }
        .side-menu a { 
            display: block; padding: 15px 25px; color: #fff; 
            text-decoration: none; font-size: 1.1rem; border-bottom: 1px solid #222; cursor: pointer;
        }
        .side-menu a:hover { background: #00d4ff; color: #000; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 10004; }
        .overlay.active { display: block; }

        /* CARDS */
        .container { max-width: 800px; margin: 0 auto; padding: 10px; }
        .post-card { background: #12121f; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #222; }
        .read-more-btn { background: #00d4ff; color: #000; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo" onclick="location.reload()">EK MYSTERY</div>
        <button class="menu-toggle" onclick="openMenu()"><i class="fas fa-bars"></i></button>
    </div>

    <div id="overlay" class="overlay" onclick="closeMenu()"></div>

    <div id="sideMenu" class="side-menu">
        <div style="text-align:right; padding:10px 20px; color:red; cursor:pointer;" onclick="closeMenu()">✕ CLOSE</div>
        <a onclick="filterBy('all')"><i class="fas fa-home"></i> Home</a>
        <a onclick="filterBy('News')"><i class="fas fa-bolt"></i> Latest Stories</a>
        <a onclick="filterBy('Video')"><i class="fas fa-video"></i> Videos</a>
        <a href="mailto:admin@ekmystery.com"><i class="fas fa-envelope"></i> Contact</a>
        <hr style="border:1px solid #333">
        <a id="installBtn" style="display:none; color:#00d4ff; font-weight:bold;"><i class="fas fa-download"></i> INSTALL APP</a>
    </div>

    <div class="container" id="post-container">Khufiya jankari load ho rahi hai...</div>

<script>
    // 1. SERVICE WORKER (App banane ke liye zaruri)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('data:application/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGV2ZW50ID0+IHsgfSk7');
    }

    // 2. MENU FUNCTIONS
    function openMenu() {
        document.getElementById('sideMenu').classList.add('active');
        document.getElementById('overlay').classList.add('active');
    }
    function closeMenu() {
        document.getElementById('sideMenu').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
    }

    // 3. INSTALL APP LOGIC (Add to Home Screen button)
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block'; // Install button dikhao
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            installBtn.style.display = 'none';
        }
    });

    // 4. DATA LOADING & FILTERING
    const SHEET_ID = '1Zzpp8OTfcvXgTKuBHfmTCzEb0k690P5EcBFmMozAQ6o';
    const G_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    let allPosts = [];

    async function loadData() {
        try {
            const res = await fetch(G_URL);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            allPosts = json.table.rows;
            displayPosts('all');
        } catch (e) { console.log(e); }
    }

    function filterBy(type) {
        displayPosts(type);
        closeMenu(); // Click ke baad menu band ho jaye
    }

    function displayPosts(type) {
        let html = '';
        allPosts.forEach(row => {
            const topic = row.c[0]?.v || '';
            const desc = row.c[1]?.v || '';
            const category = row.c[4]?.v || 'Blog';
            const status = row.c[5]?.v || '';

            if (status.toLowerCase() === 'live') {
                if (type === 'all' || category.toLowerCase() === type.toLowerCase()) {
                    html += `<div class="post-card">
                        <h2>${topic}</h2>
                        <p>${desc}</p>
                        <button class="read-more-btn">Read Story</button>
                    </div>`;
                }
            }
        });
        document.getElementById('post-container').innerHTML = html || "<p style='text-align:center;'>No posts found.</p>";
    }

    loadData();
</script>
</body>
</html>
