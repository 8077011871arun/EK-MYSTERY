<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EK MYSTERY - Official App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00d4ff">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; }
        body { background: #0a0a12; color: #d1d1d1; font-family: 'Segoe UI', sans-serif; margin: 0; padding-top: 75px; }

        /* Navbar */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid #00d4ff; z-index: 10005; }
        .navbar .logo { color: #00d4ff; font-weight: bold; font-size: 1.4rem; text-transform: uppercase; cursor: pointer; text-shadow: 0 0 10px #00d4ff; }
        .menu-toggle { color: #00d4ff; font-size: 28px; cursor: pointer; background: none; border: none; }

        /* Side Menu */
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #111; border-right: 2px solid #00d4ff; transition: 0.4s ease; z-index: 10006; padding-top: 20px; }
        .side-menu.active { left: 0; }
        .side-menu a { display: block; padding: 15px 25px; color: #fff; text-decoration: none; border-bottom: 1px solid #222; cursor: pointer; }
        .side-menu a i { width: 30px; color: #00d4ff; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 10004; }
        .overlay.active { display: block; }

        /* Post Cards */
        .container { max-width: 800px; margin: 0 auto; padding: 10px; }
        .post-card { background: #12121f; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #222; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .post-card h2 { color: #fff; margin-bottom: 10px; }
        
        /* Video Container */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; margin: 15px 0; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        /* Action Buttons (Share & Comment) */
        .action-bar { display: flex; gap: 10px; margin: 15px 0; padding-top: 10px; border-top: 1px solid #333; }
        .action-btn { flex: 1; background: #1a1a2e; border: 1px solid #00d4ff; color: #00d4ff; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .action-btn:hover { background: #00d4ff; color: #000; box-shadow: 0 0 10px #00d4ff; }

        /* Blog Content Area */
        .blog-content { display: none; background: #fff; color: #111; padding: 20px; border-radius: 8px; margin-top: 15px; white-space: pre-wrap; line-height: 1.6; font-size: 16px; }
        .read-more-btn { background: linear-gradient(90deg, #00d4ff, #008fb3); color: #000; border: none; padding: 14px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        /* Disqus Container */
        .disqus-box { margin-top: 20px; padding: 10px; background: #fdfdfd; border-radius: 8px; display: none; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo" onclick="location.reload()">EK MYSTERY</div>
        <button class="menu-toggle" onclick="openMenu()"><i class="fas fa-bars"></i></button>
    </div>

    <div id="overlay" class="overlay" onclick="closeMenu()"></div>

    <div id="sideMenu" class="side-menu">
        <div style="text-align:right; padding:10px 20px; color:red; cursor:pointer; font-weight:bold;" onclick="closeMenu()">✕ CLOSE</div>
        <a onclick="filterBy('all')"><i class="fas fa-home"></i> Home</a>
        <a onclick="filterBy('Blog')"><i class="fas fa-book-open"></i> Mystery Blogs</a>
        <a onclick="filterBy('Video')"><i class="fas fa-play-circle"></i> Videos</a>
        <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
        <a href="https://api.whatsapp.com/send?phone=918077011871" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp Us</a>
        <a href="mailto:admin@ekmystery.com"><i class="fas fa-envelope"></i> Email Support</a>
    </div>

    <div class="container" id="post-container">Andhera chha raha hai, mysteries load ho rahi hain...</div>

<script>
    // Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
    }

    function openMenu() { document.getElementById('sideMenu').classList.add('active'); document.getElementById('overlay').classList.add('active'); }
    function closeMenu() { document.getElementById('sideMenu').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }

    const SHEET_ID = '1Zzpp8OTfcvXgTKuBHfmTCzEb0k690P5EcBFmMozAQ6o';
    const G_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    let allData = [];

    async function loadData() {
        try {
            const res = await fetch(G_URL);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            allData = json.table.rows;
            displayPosts('all');
        } catch (e) { console.error("Data load fail!", e); }
    }

    function filterBy(type) { displayPosts(type); closeMenu(); }

    function displayPosts(filter) {
        let html = '';
        allData.forEach((row, index) => {
            const topic = row.c[0]?.v || '';
            const desc = row.c[1]?.v || '';
            const video = row.c[2]?.v || '';
            const blog = row.c[3]?.v || '';
            const type = row.c[4]?.v || 'Blog';
            const status = row.c[5]?.v || '';

            if (status.toLowerCase() === 'live') {
                if (filter === 'all' || type.toLowerCase() === filter.toLowerCase()) {
                    let vHtml = '';
                    if (video) {
                        let vId = video.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^#\&\?]*)/);
                        if (vId) vHtml = `<div class="video-container"><iframe src="https://www.youtube.com/embed/${vId[1]}" allowfullscreen></iframe></div>`;
                    }
                    html += `
                        <div class="post-card">
                            <span style="color:#00d4ff; font-size:11px; font-weight:bold;">${type.toUpperCase()}</span>
                            <h2>${topic}</h2>
                            <p>${desc}</p>
                            ${vHtml}
                            
                            <div class="action-bar">
                                <button class="action-btn" onclick="shareMe('${topic}')"><i class="fas fa-share-alt"></i> Share</button>
                                <button class="action-btn" onclick="openComments(${index}, '${topic}')"><i class="fas fa-comments"></i> Comment</button>
                            </div>

                            ${blog ? `
                                <button class="read-more-btn" id="btn-${index}" onclick="toggleBlog(${index})">Read Full Story</button>
                                <div id="blog-box-${index}" class="blog-content">
                                    ${blog}
                                    <div id="disqus_thread_${index}" class="disqus-box"></div>
                                </div>
                            ` : ''}
                        </div>`;
                }
            }
        });
        document.getElementById('post-container').innerHTML = html;
    }

    function toggleBlog(i) {
        const b = document.getElementById(`blog-box-${i}`);
        const btn = document.getElementById(`btn-${i}`);
        if(b.style.display === "block") { b.style.display = "none"; btn.innerText = "Read Full Story"; }
        else { b.style.display = "block"; btn.innerText = "Close Story"; }
    }

    // DISQUS SYSTEM (Already set to ek-mystery)
    function openComments(i, title) {
        const blogBox = document.getElementById(`blog-box-${i}`);
        const disqusBox = document.getElementById(`disqus_thread_${i}`);
        
        if(blogBox.style.display !== "block") toggleBlog(i);
        
        disqusBox.style.display = "block";
        
        window.disqus_config = function () {
            this.page.url = window.location.href + "#mystery-" + i;
            this.page.identifier = "mystery-" + i;
            this.page.title = title;
        };

        if (!document.getElementById('disqus-script')) {
            var d = document, s = d.createElement('script');
            s.id = 'disqus-script';
            s.src = 'https://ek-mystery.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        } else {
            DISQUS.reset({
                reload: true,
                config: function () {
                    this.page.identifier = "mystery-" + i;
                    this.page.url = window.location.href + "#mystery-" + i;
                    this.page.title = title;
                }
            });
        }
    }

    // SHARE SYSTEM
    function shareMe(title) {
        if (navigator.share) {
            navigator.share({ title: title, text: 'Check out this mystery: ' + title, url: window.location.href });
        } else {
            alert("Copy link to share!");
        }
    }

    loadData();
</script>
</body>
</html>
